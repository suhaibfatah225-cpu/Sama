    <style>
      /* CSS Styling */

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .quiz-container {
        background-color: #ffffff;
        width: 100%;
        max-width: 600px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      #category-badge {
        background-color: #e3f2fd;
        color: #1976d2;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      .timer {
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        background-color: #f8f9fa;
        padding: 5px 15px;
        border-radius: 8px;
        border: 2px solid #ddd;
      }

      .timer.warning {
        color: #d9534f;
        border-color: #d9534f;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      #progress {
        font-size: 0.9rem;
        color: #666;
      }

      h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
        color: #333;
        line-height: 1.5;
      }

      .options-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        background-color: #f8f9fa;
        border: 2px solid #eee;
        padding: 15px;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        font-size: 1rem;
        transition: all 0.2s;
      }

      .option-btn:hover {
        background-color: #e9ecef;
        border-color: #dee2e6;
      }
      /* Result Screen */

      .hidden {
        display: none;
      }

      .result-screen {
        text-align: center;
      }

      .score-text {
        font-size: 2rem;
        color: #28a745;
        margin: 20px 0;
        font-weight: bold;
      }

      .timeout-msg {
        color: #d9534f;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .restart-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
      }

      .restart-btn:hover {
        background-color: #0056b3;
      }

      .answer-key {
        margin-top: 30px;
        text-align: left;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }

      .key-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        font-size: 0.9rem;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="quiz-container">
      <!-- Quiz Screen -->
      <div id="quiz-screen">
        <div class="header">
          <span id="category-badge">Category</span>
          <span id="timer" class="timer">15:00</span>
          <span id="progress">Question 1/20</span>
        </div>
        <h2 id="question-text">Question goes here?</h2>
        <div class="options-grid" id="options-container">
          <!-- Buttons will be generated by JS -->
        </div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="hidden result-screen">
        <h2>Quiz Finished!</h2>
        <p id="timeout-message" class="hidden timeout-msg">Time is up!</p>
        <div class="score-text" id="final-score">0 / 20</div>
        <button class="restart-btn" onclick="location.reload()">
          Take Quiz Again
        </button>

        <div class="answer-key">
          <h3>Correct Answers:</h3>
          <div class="key-grid" id="answer-list"></div>
        </div>
      </div>
    </div>

    <script>
      // JavaScript Logic
      const questions = [
        // Everyday Life
        {
          q: "What do you use to dry yourself after a shower?",
          a: "A towel",
          options: ["A blanket", "A towel", "A pillow", "A sheet"],
          cat: "Everyday Life",
        },
        {
          q: "Where do you go to buy stamps and send letters?",
          a: "Post office",
          options: ["Pharmacy", "Library", "Post office", "Supermarket"],
          cat: "Everyday Life",
        },
        {
          q: "Every morning, I ________ my bed as soon as I wake up.",
          a: "make",
          options: ["do", "make", "have", "take"],
          cat: "Everyday Life",
        },
        {
          q: "You need to show your ________ to travel to another country.",
          a: "passport",
          options: ["ticket", "receipt", "passport", "menu"],
          cat: "Everyday Life",
        },

        // Describing Things
        {
          q: "My grandfather is 90 years old. He is very...",
          a: "elderly",
          options: ["young", "elderly", "tall", "heavy"],
          cat: "Descriptions",
        },
        {
          q: "The opposite of 'expensive' is...",
          a: "cheap",
          options: ["rich", "poor", "cheap", "heavy"],
          cat: "Descriptions",
        },
        {
          q: "Someone who never says 'please' or 'thank you' is...",
          a: "rude",
          options: ["kind", "rude", "funny", "quiet"],
          cat: "Descriptions",
        },
        {
          q: "If a room has no windows and the lamps are off, it is...",
          a: "dark",
          options: ["bright", "dark", "clean", "noisy"],
          cat: "Descriptions",
        },

        // Food & Drink
        {
          q: "Which of these is a vegetable?",
          a: "Carrot",
          options: ["Apple", "Banana", "Carrot", "Strawberry"],
          cat: "Food & Drink",
        },
        {
          q: "We usually eat soup with a...",
          a: "spoon",
          options: ["knife", "fork", "spoon", "plate"],
          cat: "Food & Drink",
        },
        {
          q: "A meal you eat in the middle of the day is called...",
          a: "lunch",
          options: ["breakfast", "lunch", "dinner", "snack"],
          cat: "Food & Drink",
        },
        {
          q: "Chicken, beef, and pork are all types of...",
          a: "meat",
          options: ["fruit", "vegetable", "meat", "drink"],
          cat: "Food & Drink",
        },

        // Places in Town
        {
          q: "You go to a ________ to borrow books to read at home.",
          a: "library",
          options: ["bookstore", "library", "school", "museum"],
          cat: "Places",
        },
        {
          q: "If you want to travel by train, you go to the...",
          a: "railway station",
          options: ["airport", "bus stop", "railway station", "port"],
          cat: "Places",
        },
        {
          q: "Where can you see historical objects, dinosaur bones, and old paintings?",
          a: "Museum",
          options: ["Cinema", "Museum", "Park", "Gym"],
          cat: "Places",
        },
        {
          q: "You can buy medicine at a...",
          a: "pharmacy",
          options: ["bakery", "pharmacy", "butcher", "post office"],
          cat: "Places",
        },

        // Time & Weather
        {
          q: "The season when it is very cold and often snows is...",
          a: "Winter",
          options: ["Spring", "Summer", "Autumn", "Winter"],
          cat: "Time & Weather",
        },
        {
          q: "What day comes immediately after Tuesday?",
          a: "Wednesday",
          options: ["Monday", "Thursday", "Wednesday", "Friday"],
          cat: "Time & Weather",
        },
        {
          q: "There are 60 ________ in one hour.",
          a: "minutes",
          options: ["seconds", "minutes", "days", "weeks"],
          cat: "Time & Weather",
        },
        {
          q: "When it is raining outside, you should take an...",
          a: "umbrella",
          options: ["coat", "umbrella", "scarf", "sunglasses"],
          cat: "Time & Weather",
        },
      ];

      let currentQuestionIndex = 0;
      let score = 0;

      // Timer Variables: 15 minutes = 900 seconds
      let timeRemaining = 900;
      let timerInterval;

      const quizScreen = document.getElementById("quiz-screen");
      const resultScreen = document.getElementById("result-screen");
      const questionText = document.getElementById("question-text");
      const optionsContainer = document.getElementById("options-container");
      const progressText = document.getElementById("progress");
      const categoryBadge = document.getElementById("category-badge");
      const finalScoreText = document.getElementById("final-score");
      const answerList = document.getElementById("answer-list");
      const timerDisplay = document.getElementById("timer");
      const timeoutMessage = document.getElementById("timeout-message");

      function startTimer() {
        timerInterval = setInterval(() => {
          timeRemaining--;

          // Format time to MM:SS
          let minutes = Math.floor(timeRemaining / 60);
          let seconds = timeRemaining % 60;

          // Pad single digits with a zero
          seconds = seconds < 10 ? "0" + seconds : seconds;

          timerDisplay.innerText = `${minutes}:${seconds}`;

          // Visual warning when less than 1 minute remains
          if (timeRemaining <= 60) {
            timerDisplay.classList.add("warning");
          }

          // When time runs out
          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            timeoutMessage.classList.remove("hidden");
            showResults();
          }
        }, 1000);
      }

      function loadQuestion() {
        const currentQuestion = questions[currentQuestionIndex];

        // Update texts
        categoryBadge.innerText = currentQuestion.cat;
        progressText.innerText = `Question ${currentQuestionIndex + 1}/${questions.length}`;
        questionText.innerText = currentQuestion.q;

        // Clear previous options
        optionsContainer.innerHTML = "";

        // Create new option buttons
        currentQuestion.options.forEach((option) => {
          const btn = document.createElement("button");
          btn.classList.add("option-btn");
          btn.innerText = option;
          btn.onclick = () => handleAnswer(option);
          optionsContainer.appendChild(btn);
        });
      }

      function handleAnswer(selected) {
        if (selected === questions[currentQuestionIndex].a) {
          score++;
        }

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
          loadQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        // Stop the timer
        clearInterval(timerInterval);

        // Switch screens
        quizScreen.classList.add("hidden");
        resultScreen.classList.remove("hidden");
        finalScoreText.innerText = `${score} / ${questions.length}`;

        // Fill answer key
        answerList.innerHTML = ""; // Clear just in case
        questions.forEach((item, index) => {
          const div = document.createElement("div");
          // Re-format slightly to show the full context
          if (item.q.includes("________")) {
            div.innerHTML = `<strong>${index + 1}.</strong> ${item.q.replace("________", `<u>${item.a}</u>`)}`;
          } else {
            div.innerHTML = `<strong>${index + 1}.</strong> ${item.q} <strong>(${item.a})</strong>`;
          }
          answerList.appendChild(div);
        });
      }

      // Start the quiz
      loadQuestion();
      startTimer();
    </script>
  </body>
</html>
