    <style>
      /* CSS Styling */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .quiz-container {
        background-color: #ffffff;
        width: 100%;
        max-width: 600px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      #category-badge {
        background-color: #e8f5e9;
        color: #2e7d32;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      .timer {
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        background-color: #f8f9fa;
        padding: 5px 15px;
        border-radius: 8px;
        border: 2px solid #ddd;
      }

      #progress {
        font-size: 0.9rem;
        color: #666;
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #333;
        line-height: 1.5;
      }

      .options-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        background-color: #f8f9fa;
        border: 2px solid #eee;
        padding: 15px;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        font-size: 1.1rem;
        transition: all 0.2s;
      }

      .option-btn:hover {
        background-color: #e9ecef;
        border-color: #dee2e6;
      }

      .hidden { display: none; }

      .result-screen { text-align: center; }

      .score-text {
        font-size: 2.5rem;
        color: #28a745;
        margin: 20px 0;
        font-weight: bold;
      }

      .restart-btn {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1rem;
      }

      .answer-key {
        margin-top: 30px;
        text-align: left;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
    </style>
  </head>

  <body>
    <div class="quiz-container">
      <!-- Quiz Screen -->
      <div id="quiz-screen">
        <div class="header">
          <span id="category-badge">Lesson 1 & 2</span>
          <span id="timer" class="timer">10:00</span>
          <span id="progress">Question 1/20</span>
        </div>
        <h2 id="question-text">Question goes here?</h2>
        <div class="options-grid" id="options-container"></div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="hidden result-screen">
        <h2>Great Job!</h2>
        <div class="score-text" id="final-score">0 / 20</div>
        <button class="restart-btn" onclick="location.reload()">Try Again</button>
        <div class="answer-key">
          <h3>Answers:</h3>
          <div id="answer-list"></div>
        </div>
      </div>
    </div>

    <script>
      const questions = [
        { q: "Hello! What is your ____?", a: "name", options: ["name", "book", "apple"], cat: "Greetings" },
        { q: "I ____ a student.", a: "am", options: ["is", "am", "are"], cat: "Grammar" },
        { q: "How ____ you?", a: "are", options: ["is", "am", "are"], cat: "Greetings" },
        { q: "She ____ my friend.", a: "is", options: ["is", "am", "are"], cat: "Grammar" },
        { q: "One, Two, Three, ____.", a: "Four", options: ["Ten", "Five", "Four"], cat: "Numbers" },
        { q: "A: Goodbye!  B: ____!", a: "Bye", options: ["Hello", "Bye", "Thank you"], cat: "Greetings" },
        { q: "What color is the sky?", a: "Blue", options: ["Red", "Blue", "Green"], cat: "Colors" },
        { q: "My father's wife is my ____.", a: "mother", options: ["brother", "sister", "mother"], cat: "Family" },
        { q: "Is it a cat? Yes, it ____.", a: "is", options: ["is", "am", "are"], cat: "Grammar" },
        { q: "Nice to ____ you.", a: "meet", options: ["meet", "see", "eat"], cat: "Greetings" },
        { q: "Eight, Nine, ____.", a: "Ten", options: ["Six", "Ten", "Seven"], cat: "Numbers" },
        { q: "____ are my friend.", a: "You", options: ["I", "You", "He"], cat: "Grammar" },
        { q: "A banana is ____.", a: "yellow", options: ["blue", "red", "yellow"], cat: "Colors" },
        { q: "My father's son is my ____.", a: "brother", options: ["sister", "brother", "mother"], cat: "Family" },
        { q: "I have two ____. (Left and Right)", a: "hands", options: ["hands", "books", "names"], cat: "Body" },
        { q: "He ____ a teacher.", a: "is", options: ["am", "is", "are"], cat: "Grammar" },
        { q: "Good ____! (7:00 AM)", a: "morning", options: ["morning", "night", "evening"], cat: "Time" },
        { q: "Is this a pen? No, it ____ not.", a: "is", options: ["is", "am", "are"], cat: "Grammar" },
        { q: "An apple is ____.", a: "red", options: ["blue", "red", "black"], cat: "Colors" },
        { q: "Thank ____ very much.", a: "you", options: ["me", "you", "him"], cat: "Greetings" }
      ];

      let currentQuestionIndex = 0;
      let score = 0;
      let timeRemaining = 600; // 10 minutes is plenty
      let timerInterval;

      function startTimer() {
        timerInterval = setInterval(() => {
          timeRemaining--;
          let mins = Math.floor(timeRemaining / 60);
          let secs = timeRemaining % 60;
          document.getElementById("timer").innerText = `${mins}:${secs < 10 ? '0' + secs : secs}`;
          if (timeRemaining <= 0) showResults();
        }, 1000);
      }

      function loadQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById("category-badge").innerText = q.cat;
        document.getElementById("progress").innerText = `Question ${currentQuestionIndex + 1}/20`;
        document.getElementById("question-text").innerText = q.q;
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        q.options.forEach(opt => {
          const btn = document.createElement("button");
          btn.classList.add("option-btn");
          btn.innerText = opt;
          btn.onclick = () => {
            if(opt === q.a) score++;
            currentQuestionIndex++;
            if(currentQuestionIndex < questions.length) loadQuestion();
            else showResults();
          };
          container.appendChild(btn);
        });
      }

      function showResults() {
        clearInterval(timerInterval);
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.remove("hidden");
        document.getElementById("final-score").innerText = `${score} / 20`;
        const list = document.getElementById("answer-list");
        questions.forEach((item, i) => {
          const d = document.createElement("div");
          d.style.marginBottom = "5px";
          d.innerHTML = `${i+1}. ${item.q.replace("____", "<u>" + item.a + "</u>")}`;
          list.appendChild(d);
        });
      }

      loadQuestion();
      startTimer();
    </script>
  </body>
</html>
