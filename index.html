<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beginner English Quiz</title>
    <link rel="icon" href="./Images/english-language-irregularities.jpeg" />
    <style>
      /* CSS Styling */

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .quiz-container {
        background-color: #ffffff;
        width: 100%;
        max-width: 500px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      #category-badge {
        background-color: #e3f2fd;
        color: #1976d2;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      #progress {
        font-size: 0.9rem;
        color: #666;
      }

      h2 {
        font-size: 1.4rem;
        margin-bottom: 20px;
        color: #333;
      }

      .options-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option-btn {
        background-color: #f8f9fa;
        border: 2px solid #eee;
        padding: 15px;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
        font-size: 1rem;
        transition: all 0.2s;
      }

      .option-btn:hover {
        background-color: #e9ecef;
        border-color: #dee2e6;
      }
      /* Result Screen */

      .hidden {
        display: none;
      }

      .result-screen {
        text-align: center;
      }

      .score-text {
        font-size: 2rem;
        color: #28a745;
        margin: 20px 0;
        font-weight: bold;
      }

      .restart-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
      }

      .answer-key {
        margin-top: 30px;
        text-align: left;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }

      .key-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 0.85rem;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="quiz-container">
      <!-- Quiz Screen -->
      <div id="quiz-screen">
        <div class="header">
          <span id="category-badge">Category</span>
          <span id="progress">Question 1/20</span>
        </div>
        <h2 id="question-text">Question goes here?</h2>
        <div class="options-grid" id="options-container">
          <!-- Buttons will be generated by JS -->
        </div>
      </div>

      <!-- Result Screen -->
      <div id="result-screen" class="hidden result-screen">
        <h2>Quiz Finished!</h2>
        <div class="score-text" id="final-score">0 / 20</div>
        <button class="restart-btn" onclick="location.reload()">
          Take Quiz Again
        </button>

        <div class="answer-key">
          <h3>Correct Answers:</h3>
          <div class="key-grid" id="answer-list"></div>
        </div>
      </div>
    </div>

    <script>
      // JavaScript Logic
      const questions = [
        // Feelings
        {
          q: "I smile when I am...",
          a: "Happy",
          options: ["Happy", "Sad", "Angry", "Tired"],
          cat: "Feelings",
        },
        {
          q: "I want to sleep because I am...",
          a: "Tired",
          options: ["Brave", "Clever", "Tired", "Hungry"],
          cat: "Feelings",
        },
        {
          q: "He is crying because he is...",
          a: "Sad",
          options: ["Happy", "Sad", "Fast", "Tall"],
          cat: "Feelings",
        },
        {
          q: "She knows all the answers. She is...",
          a: "Clever",
          options: ["Angry", "Hungry", "Clever", "Thirsty"],
          cat: "Feelings",
        },
        // Jobs
        {
          q: "Who works in a school?",
          a: "Teacher",
          options: ["Doctor", "Teacher", "Barber", "Actor"],
          cat: "Jobs",
        },
        {
          q: "Who helps sick people?",
          a: "Doctor",
          options: ["Doctor", "Accountant", "Actor", "Barber"],
          cat: "Jobs",
        },
        {
          q: "Who cuts your hair?",
          a: "Barber",
          options: ["Teacher", "Doctor", "Barber", "Pilot"],
          cat: "Jobs",
        },
        {
          q: "Who acts in a movie?",
          a: "Actor",
          options: ["Barber", "Actor", "Nurse", "Driver"],
          cat: "Jobs",
        },
        // Family
        {
          q: "Your father's brother is your...",
          a: "Uncle",
          options: ["Aunt", "Uncle", "Mother", "Sister"],
          cat: "Family",
        },
        {
          q: "Your mother's sister is your...",
          a: "Aunt",
          options: ["Brother", "Uncle", "Aunt", "Father"],
          cat: "Family",
        },
        {
          q: "A girl born to your parents is your...",
          a: "Sister",
          options: ["Brother", "Sister", "Cousin", "Niece"],
          cat: "Family",
        },
        {
          q: "Your mother and father are your...",
          a: "Parents",
          options: ["Parents", "Children", "Cousins", "Aunts"],
          cat: "Family",
        },
        // Animals
        {
          q: "This animal says 'Meow':",
          a: "Cat",
          options: ["Dog", "Cow", "Cat", "Lion"],
          cat: "Animals",
        },
        {
          q: "This animal gives us milk:",
          a: "Cow",
          options: ["Bird", "Cow", "Lion", "Fish"],
          cat: "Animals",
        },
        {
          q: "This animal can fly:",
          a: "Bird",
          options: ["Dog", "Bird", "Cat", "Cow"],
          cat: "Animals",
        },
        {
          q: "This animal is the king of the jungle:",
          a: "Lion",
          options: ["Cat", "Lion", "Dog", "Bird"],
          cat: "Animals",
        },
        // Opposites
        {
          q: "What is the opposite of 'Hot'?",
          a: "Cold",
          options: ["Big", "Fast", "Cold", "Small"],
          cat: "Opposites",
        },
        {
          q: "What is the opposite of 'Big'?",
          a: "Small",
          options: ["Small", "Tall", "Slow", "Happy"],
          cat: "Opposites",
        },
        {
          q: "What is the opposite of 'Fast'?",
          a: "Slow",
          options: ["Hot", "Slow", "Big", "Cold"],
          cat: "Opposites",
        },
        {
          q: "What is the opposite of 'Happy'?",
          a: "Sad",
          options: ["Brave", "Clever", "Sad", "Fast"],
          cat: "Opposites",
        },
      ];

      let currentQuestionIndex = 0;
      let score = 0;

      const quizScreen = document.getElementById("quiz-screen");
      const resultScreen = document.getElementById("result-screen");
      const questionText = document.getElementById("question-text");
      const optionsContainer = document.getElementById("options-container");
      const progressText = document.getElementById("progress");
      const categoryBadge = document.getElementById("category-badge");
      const finalScoreText = document.getElementById("final-score");
      const answerList = document.getElementById("answer-list");

      function loadQuestion() {
        const currentQuestion = questions[currentQuestionIndex];

        // Update texts
        categoryBadge.innerText = currentQuestion.cat;
        progressText.innerText = `Question ${currentQuestionIndex + 1}/${
          questions.length
        }`;
        questionText.innerText = currentQuestion.q;

        // Clear previous options
        optionsContainer.innerHTML = "";

        // Create new option buttons
        currentQuestion.options.forEach((option) => {
          const btn = document.createElement("button");
          btn.classList.add("option-btn");
          btn.innerText = option;
          btn.onclick = () => handleAnswer(option);
          optionsContainer.appendChild(btn);
        });
      }

      function handleAnswer(selected) {
        if (selected === questions[currentQuestionIndex].a) {
          score++;
        }

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
          loadQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        quizScreen.classList.add("hidden");
        resultScreen.classList.remove("hidden");
        finalScoreText.innerText = `${score} / ${questions.length}`;

        // Fill answer key
        questions.forEach((item, index) => {
          const div = document.createElement("div");
          div.innerText = `${index + 1}. ${item.a}`;
          answerList.appendChild(div);
        });
      }

      // Start the quiz
      loadQuestion();
    </script>
  </body>
</html>
